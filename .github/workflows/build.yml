name: Build SecureCRT Flatpak

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'SecureCRT_Flatpak_PRD.md'
  workflow_dispatch:
    inputs:
      deb_url:
        description: 'Optional: direct download URL for scrt-*.deb (leave blank to use release asset)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    # Skip automated push builds if the deb URL secret isn't configured
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && vars.SCRT_DEB_URL != '')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder binutils elfutils \
            libglib2.0-bin

      - name: Add Flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-freedesktop-24.08-${{ runner.os }}

      - name: Install Flatpak runtime and SDK
        run: |
          flatpak install -y --user flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.gtk.Gtk3theme.Adwaita//3.22 || true

      - name: Download SecureCRT .deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEB_URL: ${{ inputs.deb_url || vars.SCRT_DEB_URL || secrets.SCRT_DEB_URL }}
        run: |
          if [ -n "$DEB_URL" ]; then
            echo "Downloading .deb from URL..."
            curl -fsSL -o "$(basename "$DEB_URL" | sed 's/?.*//')" "$DEB_URL"
          else
            echo "Downloading .deb from GitHub release assets..."
            gh release download --repo "$GITHUB_REPOSITORY" \
              --pattern "scrt-*.deb" --dir . || {
              echo "ERROR: No scrt-*.deb found in any release asset and no DEB_URL provided."
              echo ""
              echo "To fix: upload scrt-*.deb as a release asset at:"
              echo "  https://github.com/$GITHUB_REPOSITORY/releases"
              exit 1
            }
          fi
          ls -lh scrt-*.deb

      - name: Build Flatpak
        run: bash build.sh

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: SecureCRT-flatpak
          path: SecureCRT.flatpak
          retention-days: 30
